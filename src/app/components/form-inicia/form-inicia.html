<div class="login-container">
  <form class="login-form" (ngSubmit)="onSubmit()">
    <img src="assets/logo.png" alt="title" class="login-logo">
    <h1 class="login-title">Inicia sesión</h1>
    <label for="email" class="login-label">Correo electronico</label>
    <input id="email" name="email" type="email" class="login-input" required [(ngModel)]="email">
    <label for="password" class="login-label">Contraseña</label>
    <input id="password" name="password" type="password" class="login-input" required [(ngModel)]="password">
    <button type="submit" class="login-btn-main">Continuar</button>
    <button type="button" class="login-btn-secondary" (click)="navigateToCreaCuenta()">Crear cuenta</button>
  </form>
</div>

<div *ngIf="mensaje" [ngClass]="mensajeTipo === 'success' ? 'mensaje-exito' : 'mensaje-error'">
  {{ mensaje }}
</div>
