<div class="login-container">
  <form class="login-form" (ngSubmit)="onSubmit()">
    <img src="assets/logo.png" alt="title" class="login-logo">
    <h1 class="login-title">Crear cuenta</h1>
 
    <label for="email" class="login-label">Correo electrónico</label>
    <input
      id="email"
      name="email"
      type="email"
      class="login-input"
      [(ngModel)]="email"
      required
    >
 
    <label for="password" class="login-label">Contraseña</label>
    <input
      id="password"
      name="password"
      type="password"
      class="login-input"
      [(ngModel)]="password"
      required
    >
 
    <label for="confirm-password" class="login-label">Confirmar Contraseña</label>
    <input
      id="confirm-password"
      name="confirmPassword"
      type="password"
      class="login-input"
      [(ngModel)]="confirmPassword"
      required
    >
 
    <button type="submit" class="login-btn-main">Continuar</button>
  </form>
</div>
